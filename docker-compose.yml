# Infra do Motor de Consolidação Cambial: db + backend + frontend.
# `docker compose up -d --build` sobe os três; dashboard em http://localhost:8080.
services:
  db:
    image: mysql:8.0
    container_name: motor_cambial_db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-motor_cambial}
      MYSQL_USER: ${MYSQL_USER:-motor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-motor}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      # Fixo em 3306 para casar com os alvos do Makefile (migrate/test-integration).
      # Se houver um MySQL local na 3306, pare-o antes de `make up`.
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # -h 127.0.0.1 força TCP: só passa quando o servidor de rede real está no ar
      # (evita o falso-positivo do servidor temporário de init do MySQL).
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: .
    container_name: motor_cambial_backend
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    environment:
      MOTOR_DB_HOST: db
      MOTOR_DB_USER: ${MYSQL_USER:-motor}
      MOTOR_DB_PASSWORD: ${MYSQL_PASSWORD:-motor}
      MOTOR_DB_NAME: ${MYSQL_DATABASE:-motor_cambial}
      MOTOR_MODO_LIVE: ${MOTOR_MODO_LIVE:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: motor_cambial_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
